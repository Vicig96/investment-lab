version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-investlab}
      POSTGRES_USER: ${POSTGRES_USER:-investlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-investlab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-investlab}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-investlab}:${POSTGRES_PASSWORD:-investlab}@db:5432/${POSTGRES_DB:-investlab}
      DATABASE_URL_SYNC: postgresql+psycopg2://${POSTGRES_USER:-investlab}:${POSTGRES_PASSWORD:-investlab}@db:5432/${POSTGRES_DB:-investlab}
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
